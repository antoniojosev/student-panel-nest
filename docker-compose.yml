services:
  postgres:
    image: postgres:16-alpine
    container_name: vracademy-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vracademy
      POSTGRES_PASSWORD: vracademy
      POSTGRES_DB: vracademy
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
